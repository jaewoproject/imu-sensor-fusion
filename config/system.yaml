# System Configuration v4.0 — Hybrid-AirScribe
# 기존 포트번호 동일 유지

network:
  ports:
    discovery: 12344        # ESP32↔Python 디스커버리
    esp_receive: 12345      # ESP32 → Python 센서 데이터
    unity_send: 12346       # Python → Unity 시각화
    dashboard: 12347        # 대시보드 웹소켓
    action_dispatch: 12348  # 액션 디스패치
    phone: 12349            # 폰 연동
    python_control: 12350   # Python 제어 명령
    oled_control: 5555      # ESP32 OLED 상태 업데이트

# UDP 패킷 포맷
packet:
  version: 4
  header: 0xAA
  footer: 0x55
  # V4: [header 1B][seq 2B][timestamp 4B][S1/WRIST 24B][S3/FINGER 36B][button 1B][checksum 1B][footer 1B] = 70B
  # V3: [header 1B][timestamp 4B][S1 24B][S3 36B][button 1B][checksum 1B][footer 1B] = 68B (이전 펌웨어 호환)
  # Legacy: [header 1B][timestamp 4B][S1 24B][S2 24B][S3 36B][button 1B][checksum 1B][footer 1B] = 92B


fusion:
  mode: dual_node_ekf       # EKF 기반 듀얼 노드 보정
  accel_noise_std: 0.5
  # drift_observer:         # [DISABLED] 복구 시 주석 해제
  #   enabled: true
  # writing_plane:
  #   absolute_lock: true

preprocessing:
  zupt:
    enabled: true
    gyro_threshold: 0.05
  zaru:
    enabled: true            # Zero Angular Rate Update

calibration:
  num_samples: 300           # 정지 상태 캘리브레이션 샘플 수
  quality_thresholds:
    accel_std_max: 0.5       # m/s²
    gyro_std_max: 0.02       # rad/s

