action_dispatch:
  udp_port: 12349
  ws_port: 18800
  confidence_threshold: 0.6
  model_type: "cnn"
  action_map:
    C:
      keyword: CALL
      intent: "tel:"
      description: "전화기 (Dialer)"
    M:
      keyword: MESSAGE
      intent: "sms:"
      description: "메시지 (SMS)"
    G:
      keyword: GEMINI
      intent: "gemini:"
      description: "AI 어시스턴트"
    S:
      keyword: SEARCH
      intent: "search:"
      description: "웹 검색"
    W:
      keyword: WEATHER
      intent: "weather:"
      description: "날씨 확인"
    P:
      keyword: PHOTO
      intent: "camera:"
      description: "카메라 실행"
    V:
      keyword: GALLERY
      intent: "gallery:"
      description: "갤러리 열기"
    T:
      keyword: TIMER
      intent: "timer:"
      description: "타이머 설정"
    A:
      keyword: ALARM
      intent: "alarm:"
      description: "알람 설정"
    N:
      keyword: NOTE
      intent: "note:"
      description: "노트 작성"
    H:
      keyword: HOME
      intent: "home:"
      description: "홈 화면으로 이동"
    B:
      keyword: BIXBY
      intent: "bixby:"
      description: "보이스 커맨드"

fusion:
  accel_noise_std: 0.5
  drift_observer:
    enabled: true
  writing_plane:
    absolute_lock: true
  zupt:
    gyro_threshold: 0.05

visualization:
  writing_board:
    plane_skew_deg: -2.5
