macro_os:
  enabled: true
  active_profile: "RUNNING"
  udp_ports:
    web_ui: 12348
    phone: 12349
  
  profiles:
    RUNNING:
      allowed_gestures: ["C", "O", "V", "L"]
      confidence_threshold: 0.65
      secure_gestures: ["C", "V"]  # CALL, LOCATION
      description: "러닝 모드: 전화, 음악, 위치공유, 손전등"
      mappings:
        C: {keyword: "CALL_FAVORITE", intent: "tel:010-1234-5678"}
        O: {keyword: "MUSIC_PLAY_PAUSE", intent: "media:toggle"}
        V: {keyword: "SHARE_LOCATION", intent: "sms:current_loc"}
        L: {keyword: "TOGGLE_FLASHLIGHT", intent: "system:flashlight"}
        
    LAB:
      allowed_gestures: ["T", "C", "N", "L"]
      confidence_threshold: 0.7
      secure_gestures: []
      description: "실험 모드: 타이머, 카메라, 노트, 손전등"
      mappings:
        T: {keyword: "START_TIMER", intent: "timer:5m"}
        C: {keyword: "OPEN_CAMERA", intent: "camera:open"}
        N: {keyword: "QUICK_NOTE", intent: "note:voice"}
        L: {keyword: "TOGGLE_FLASHLIGHT", intent: "system:flashlight"}

    PRESENTATION:
      allowed_gestures: ["N", "P", "C", "O"]
      confidence_threshold: 0.75
      secure_gestures: ["C"]
      description: "발표 모드: 다음, 이전, 캡처, 확인"
      mappings:
        N: {keyword: "NEXT_SLIDE", intent: "key:right"}
        P: {keyword: "PREV_SLIDE", intent: "key:left"}
        C: {keyword: "CAPTURE_SCREEN", intent: "system:screenshot"}
        O: {keyword: "CONFIRM_ACTION", intent: "key:enter"}

    BED:
      allowed_gestures: ["O", "L", "C"]
      confidence_threshold: 0.6
      secure_gestures: ["C"]
      description: "침대 모드: 음악, 조명, 전화"
      mappings:
        O: {keyword: "MUSIC_TOGGLE", intent: "media:toggle"}
        L: {keyword: "LIGHT_CONTROL", intent: "home:light_toggle"}
        C: {keyword: "EMERGENCY_CALL", intent: "tel:112"}

fusion:
  accel_noise_std: 0.5
  drift_observer:
    enabled: true
  writing_plane:
    absolute_lock: true
  zupt:
    gyro_threshold: 0.05

visualization:
  writing_board:
    plane_skew_deg: -2.5
