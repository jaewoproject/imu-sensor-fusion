<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AirWriting 디지털 트윈 - 실시간 3D IMU 궤적 시각화">
    <title>AirWriting Digital Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f8fafc; /* 화이트보드 테마 */
            --bg-card: rgba(255, 255, 255, 0.85); /* 흰색 UI 카드 */
            --bg-hover: rgba(241, 245, 249, 0.95);
            --accent: #0f172a; /* 마카 검은색 */
            --accent-light: #334155;
            --accent-glow: rgba(15, 23, 42, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border: rgba(15, 23, 42, 0.15);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        .hud { position: fixed; z-index: 10; pointer-events: none; }
        .hud > * { pointer-events: auto; }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            transition: box-shadow 0.3s ease;
        }
        .card:hover { box-shadow: var(--shadow-lg); }

        /* ── Title ── */
        .title-bar {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
        }
        .title-bar h1 {
            font-size: 14px; font-weight: 600; letter-spacing: 3px;
            text-transform: uppercase; color: var(--text-muted);
        }
        .title-bar h1 span { color: var(--accent); font-weight: 800; }

        /* ── Top-left: Status ── */
        .hud-top-left { top: 16px; left: 16px; }
        .status-panel { padding: 14px 18px; min-width: 200px; }
        .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .status-row:last-child { margin-bottom: 0; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--error);
            flex-shrink: 0; animation: pulse 2s infinite;
        }
        .status-dot.connected { background: var(--success); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
        .status-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .status-value { font-size: 12px; font-weight: 500; color: var(--text); margin-left: auto; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── Top-right: Recognition (Sentence Mode) ── */
        .hud-top-right { top: 16px; right: 16px; }
        .recognition-panel { padding: 12px 16px; text-align: left; min-width: 180px; max-width: 350px; transition: all 0.3s ease; }
        .recognition-panel.collapsed { max-width: 120px; min-width: 80px; }
        .recognition-panel.collapsed .recognition-char { font-size: 16px; min-height: 20px; max-height: 24px; overflow: hidden; }
        .recognition-panel.collapsed .recognition-confidence,
        .recognition-panel.collapsed .recognition-actions { display: none; }
        .recognition-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .recognition-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
        .recognition-toggle {
            background: none; border: 1px solid var(--border); color: var(--text-muted);
            width: 22px; height: 22px; border-radius: 6px; cursor: pointer; font-size: 10px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .recognition-toggle:hover { background: var(--accent-glow); color: var(--accent); }
        .recognition-char {
            font-size: 28px; font-weight: 800; line-height: 1.3;
            color: var(--accent); white-space: pre-wrap; word-break: break-all;
            min-height: 36px; max-height: 120px; overflow-y: auto;
        }
        .recognition-char::after {
            content: '|';
            animation: blink 1s step-start infinite;
            margin-left: 1px;
            color: var(--text-muted);
            font-weight: 300;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .recognition-confidence { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .confidence-bar { display: none; }
        .recognition-actions { display: flex; gap: 6px; margin-top: 8px; }
        .recog-btn {
            background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary);
            padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 11px;
            font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.15s;
        }
        .recog-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
        .recog-btn.danger:hover { border-color: var(--error); color: var(--error); }

        /* ── Bottom-left: Sensors ── */
        .hud-bottom-left { bottom: 16px; left: 16px; }
        .sensor-panel { padding: 14px 16px; min-width: 260px; font-size: 11px; font-family: 'SF Mono', 'Consolas', monospace; }
        .sensor-group { margin-bottom: 6px; }
        .sensor-group:last-child { margin-bottom: 0; }
        .sensor-name { color: var(--accent); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .sensor-values { color: var(--text-secondary); margin-top: 1px; }

        /* ── Bottom-center: Training UI ── */
        .hud-bottom-center { bottom: 16px; left: 50%; transform: translateX(-50%); }
        .training-panel {
            padding: 14px 20px; display: flex; align-items: center; gap: 12px;
        }
        .train-label-input {
            background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
            padding: 8px 14px; width: 80px; font-size: 18px; font-weight: 700;
            color: var(--text); text-align: center; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        .train-label-input:focus { border-color: var(--accent); }
        .train-label-input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 12px; }

        .train-btn {
            padding: 8px 18px; border-radius: 10px; border: none; font-size: 12px;
            font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; gap: 6px;
        }
        .train-btn:active { transform: scale(0.96); }
        .train-btn.primary { background: var(--accent); color: #fff; }
        .train-btn.primary:hover { background: #3b5de7; box-shadow: 0 4px 12px rgba(79,110,247,0.3); }
        .train-btn.secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
        .train-btn.secondary:hover { background: var(--bg-hover); border-color: var(--accent); }
        .train-btn.danger { background: var(--error); color: #fff; }
        .train-btn.danger:hover { background: #dc2626; }

        .train-progress {
            width: 120px; height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden;
        }
        .train-progress-fill {
            height: 100%; background: var(--accent); border-radius: 2px;
            transition: width 0.1s linear; width: 0%;
        }
        .train-status { font-size: 11px; color: var(--text-secondary); min-width: 80px; }
        .sample-count { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        /* ── Bottom-right: Controls ── */
        .hud-bottom-right { bottom: 16px; right: 16px; }
        .controls-panel { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
        .ctrl-btn {
            background: transparent; border: 1.5px solid var(--border); color: var(--text);
            padding: 7px 14px; border-radius: 10px; cursor: pointer;
            font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 500;
            transition: all 0.2s ease; text-align: left;
        }
        .ctrl-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
        .ctrl-btn kbd {
            background: var(--bg); padding: 1px 5px; border-radius: 4px;
            font-size: 10px; margin-right: 4px; border: 1px solid var(--border);
        }

        /* ── Morphing indicator ── */
        .morph-indicator {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        .morph-indicator.active { opacity: 1; }
        .morph-text {
            font-size: 13px; color: var(--accent); font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(79,110,247,0.3);
        }

        /* ── Writing indicator ── */
        .writing-indicator {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            z-index: 5; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .writing-indicator.active { opacity: 1; }
        .writing-badge {
            background: var(--accent); color: #fff; padding: 4px 14px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
            letter-spacing: 1px; box-shadow: 0 2px 8px rgba(79,110,247,0.3);
        }

        /* ── Dashboard (Dataset & Graph) ── */
        .dashboard-overlay {
            position: fixed; top: 5%; left: 5%; width: 90%; height: 90%;
            background: var(--bg-card); backdrop-filter: blur(20px); border-radius: 16px;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border);
            z-index: 100; display: flex; flex-direction: column; overflow: hidden;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.02);
        }
        .dashboard-header h2 { font-size: 18px; font-weight: 600; color: var(--text); }
        .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); }
        .close-btn:hover { color: var(--error); }
        .dashboard-content { display: flex; flex: 1; overflow: hidden; }
        
        .class-list-panel { width: 350px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        .class-list-panel h3 { padding: 15px 20px; font-size: 14px; color: var(--text-secondary); background: var(--bg-card); posisiton: sticky; top: 0; }
        .list-headers { display: flex; padding: 10px 20px; font-size: 11px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .list-headers span:nth-child(1) { flex: 2; }
        .list-headers span:nth-child(2) { flex: 1; text-align: center; }
        .list-headers span:nth-child(3) { flex: 1; text-align: right; }
        
        .class-list { padding: 10px; }
        .class-item { display: flex; padding: 12px 10px; border-radius: 8px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px; }
        .class-item:hover { background: rgba(0,0,0,0.04); }
        .class-item.selected { background: var(--accent-glow); outline: 1px solid var(--accent); }
        .class-item span { font-size: 14px; font-weight: 500; }
        .class-item span:nth-child(1) { flex: 2; color: var(--text); font-weight: 600; }
        .class-item span:nth-child(2) { flex: 1; text-align: center; color: var(--text-secondary); }
        .class-item span:nth-child(3) { flex: 1; text-align: right; color: var(--success); }

        .chart-panel { flex: 1; padding: 30px; display: flex; flex-direction: column; }
        .chart-panel h3 { font-size: 16px; margin-bottom: 20px; color: var(--text); font-weight: 600; }
        .chart-container { flex: 1; min-height: 0; width: 100%; position: relative; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="title-bar"><h1>Air<span>Writing</span> Digital Twin</h1></div>

    <!-- Status -->
    <div class="hud hud-top-left">
        <div class="card status-panel" id="status-panel">
            <div class="status-row">
                <div class="status-dot" id="ws-status-dot"></div>
                <span class="status-label">WebSocket</span>
                <span class="status-value" id="ws-status-text">Disconnected</span>
            </div>
            <div class="status-row">
                <span class="status-label">FPS</span>
                <span class="status-value" id="fps-value">0</span>
            </div>
            <div class="status-row">
                <span class="status-label">Frames</span>
                <span class="status-value" id="frame-count">0</span>
            </div>
        </div>
    </div>

    <!-- Recognition -->
    <div class="hud hud-top-right">
        <div class="card recognition-panel" id="recognition-panel">
            <div class="recognition-header">
                <div class="recognition-label">Recognized</div>
                <button class="recognition-toggle" id="btn-toggle-recog" onclick="toggleRecogPanel()" title="접기/펼치기">▼</button>
            </div>
            <div class="recognition-char" id="recognized-char">—</div>
            <div class="recognition-confidence" id="recognized-conf">0%</div>
            <div class="confidence-bar"><div class="confidence-fill" id="confidence-fill"></div></div>
            <div class="recognition-actions">
                <button class="recog-btn" onclick="eraseLastChar()" title="마지막 글자 삭제 (Backspace)">⌫ 지우기</button>
                <button class="recog-btn danger" onclick="clearAllText()" title="전체 삭제">✕ 전체삭제</button>
            </div>
        </div>
    </div>

    <!-- Sensor Data -->
    <div class="hud hud-bottom-left">
        <div class="card sensor-panel" id="sensor-panel">
            <div class="sensor-group"><div class="sensor-name">S1 Forearm</div><div class="sensor-values" id="s1-data">— — —</div></div>
            <div class="sensor-group"><div class="sensor-name">S2 Hand</div><div class="sensor-values" id="s2-data">— — —</div></div>
            <div class="sensor-group"><div class="sensor-name">S3 Finger</div><div class="sensor-values" id="s3-data">— — —</div></div>
            <div class="sensor-group"><div class="sensor-name">Fingertip</div><div class="sensor-values" id="tip-data">— — —</div></div>
        </div>
    </div>

    <!-- Training Panel -->
    <div class="hud hud-bottom-center">
        <div class="card training-panel" id="training-panel">
            <input type="text" class="train-label-input" id="train-label" placeholder="글자" maxlength="4">
            <button class="train-btn primary" id="btn-record" onclick="startRecording()">⏺ Record</button>
            <button class="train-btn secondary" id="btn-train" onclick="startTraining()">🧠 Train</button>
            <div class="train-progress"><div class="train-progress-fill" id="train-progress-fill"></div></div>
            <span class="train-status" id="train-status">Ready</span>
            <span class="sample-count" id="sample-count">0 samples</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="hud hud-bottom-right">
        <div class="card controls-panel">
            <button class="ctrl-btn" onclick="clearTrajectory()"><kbd>C</kbd> Clear</button>
            <button class="ctrl-btn" onclick="recenterView()"><kbd>Z</kbd> 영점(화면중앙) 맞춤</button>
            <button class="ctrl-btn" onclick="toggleView()"><kbd>R</kbd> 3D View 전환</button>
            <button class="ctrl-btn" onclick="toggleGrid()"><kbd>G</kbd> Grid</button>
            <button class="ctrl-btn" onclick="toggleConnection()"><kbd>Space</kbd> Connect</button>
            <button class="ctrl-btn" onclick="toggleDashboard()"><kbd>D</kbd> Dashboard</button>
            <button class="ctrl-btn" onclick="openTextViewer()"><kbd>W</kbd> Text Viewer</button>
            <button class="ctrl-btn" onclick="restartServer()" style="color: var(--error); border-color: var(--error);">🔄 서버 재시작</button>
        </div>
    </div>

    <!-- Dashboard Overlay (Analytics) -->
    <div class="dashboard-overlay" id="dashboard-overlay" style="display: none;">
        <div class="dashboard-header">
            <h2>Data & Analytics Dashboard</h2>
            <button class="close-btn" onclick="toggleDashboard()">✕</button>
        </div>
        <div class="dashboard-content">
            <div class="class-list-panel">
                <h3>Vocabulary List</h3>
                <div class="list-headers">
                    <span>Word</span>
                    <span>Samples</span>
                    <span>Best Acc</span>
                </div>
                <div class="class-list" id="class-list">
                    <!-- JS population goes here -->
                </div>
            </div>
            <div class="chart-panel">
                <h3 id="chart-title">Real-time Accuracy Growth</h3>
                <div class="chart-container">
                    <canvas id="accuracyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Indicators -->
    <div class="writing-indicator" id="writing-indicator"><div class="writing-badge">✏️ WRITING</div></div>
    <div class="morph-indicator" id="morph-indicator"><div class="morph-text">✨ Morphing...</div></div>

    <script src="js/libs/three.min.js"></script>
    <script src="js/libs/LineMaterial.js"></script>
    <script src="js/libs/LineSegmentsGeometry.js"></script>
    <script src="js/libs/LineGeometry.js"></script>
    <script src="js/libs/Line2.js"></script>
    <script src="js/libs/OrbitControls.js"></script>
    <script src="js/libs/chart.js"></script>
    <script src="js/digital_twin.js?v=1.0"></script>
    <script src="js/main.js?v=10.0"></script>
    <script>
        // Inertial Intelligence Dashboard toggle (I key)
        let _dtDashboard = null;
        let _dtVisible = false;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'i' || e.key === 'I') {
                if (!_dtDashboard) {
                    _dtDashboard = new InertialIntelligenceDashboard();
                    // Inject CSS
                    const style = document.createElement('style');
                    style.textContent = InertialIntelligenceDashboard.createDashboardCSS();
                    document.head.appendChild(style);
                }
                _dtVisible = !_dtVisible;
                let el = document.getElementById('dt-dashboard');
                if (_dtVisible) {
                    if (!el) {
                        document.body.insertAdjacentHTML('beforeend',
                            InertialIntelligenceDashboard.createDashboardHTML());
                    } else {
                        el.style.display = 'flex';
                    }
                    _dtDashboard.connect();
                } else {
                    if (el) el.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
