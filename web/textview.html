<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AirWriting Text Viewer - 실시간 글자 인식 결과 뷰어">
    <title>AirWriting — Text Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.85);
            --bg-surface: rgba(30, 30, 45, 0.6);
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(16, 185, 129, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(99, 102, 241, 0.02) 0%, transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── Header ── */
        .header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .header h1 span {
            color: var(--accent-light);
            font-weight: 800;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--error);
            animation: pulse 2s infinite;
        }
        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 7px 16px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent-light);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.15);
        }
        .btn:active { transform: scale(0.96); }
        .btn.danger:hover {
            border-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        /* ── Main Layout ── */
        .main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Text Display Area ── */
        .text-display-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 60px;
            min-height: 0;
            position: relative;
        }

        .text-container {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            position: relative;
        }

        .text-output {
            font-size: clamp(48px, 8vw, 120px);
            font-weight: 900;
            line-height: 1.25;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
            min-height: 1.25em;
            letter-spacing: 2px;
            text-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
            transition: text-shadow 0.3s ease;
            overflow-y: auto;
            max-height: calc(100vh - 300px);
            padding: 10px 0;
        }

        .text-output.empty {
            color: var(--text-muted);
            font-weight: 400;
            font-size: clamp(24px, 3vw, 36px);
            letter-spacing: 4px;
        }

        /* Cursor blink */
        .text-cursor {
            display: inline-block;
            width: 3px;
            height: 0.9em;
            background: var(--accent-light);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: cursorBlink 1s step-start infinite;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }
        @keyframes cursorBlink { 50% { opacity: 0; } }

        /* New character flash */
        .char-flash {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: 900;
            color: var(--accent-light);
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        .char-flash.active {
            animation: charFlashAnim 0.6s ease-out forwards;
        }
        @keyframes charFlashAnim {
            0%   { opacity: 0.5; transform: translate(-50%, -50%) scale(0.6); }
            40%  { opacity: 0.3; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.5); }
        }

        /* ── Bottom Panel: Confidence Log ── */
        .bottom-panel {
            position: relative;
            z-index: 10;
            border-top: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            transition: height 0.3s ease;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            cursor: pointer;
            user-select: none;
        }
        .panel-header:hover { background: rgba(255, 255, 255, 0.02); }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .count-badge {
            background: var(--accent-glow);
            color: var(--accent-light);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .panel-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.3s ease;
        }
        .panel-toggle.collapsed { transform: rotate(180deg); }

        .log-container {
            max-height: 200px;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 24px 12px;
            transition: max-height 0.3s ease;
        }
        .log-container.collapsed {
            max-height: 0;
            padding-bottom: 0;
        }

        /* Custom scrollbar */
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 2px;
        }

        .text-output::-webkit-scrollbar { width: 4px; }
        .text-output::-webkit-scrollbar-track { background: transparent; }
        .text-output::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 2px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 7px 12px;
            margin-bottom: 3px;
            border-radius: 8px;
            background: var(--bg-surface);
            border: 1px solid transparent;
            font-size: 12px;
            animation: logSlideIn 0.25s ease-out;
            transition: border-color 0.2s;
        }
        .log-entry:hover { border-color: var(--border); }

        .log-entry.new {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
        }

        @keyframes logSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .log-time {
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 10px;
            color: var(--text-muted);
            min-width: 65px;
        }

        .log-char {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            min-width: 30px;
            text-align: center;
        }

        .log-confidence {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .conf-bar-track {
            flex: 1;
            max-width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .conf-value {
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 12px;
            font-weight: 600;
            min-width: 45px;
            text-align: right;
        }

        .conf-high { color: var(--success); }
        .conf-mid  { color: var(--warning); }
        .conf-low  { color: var(--error); }

        /* ── Empty state ── */
        .empty-log {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* ── Character count ── */
        .char-count {
            position: absolute;
            bottom: 10px;
            right: 30px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'SF Mono', 'Consolas', monospace;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>Air<span>Writing</span> Text Viewer</h1>
            <div class="status-badge">
                <div class="status-dot" id="ws-status-dot"></div>
                <span id="ws-status-text">Disconnected</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn" id="btn-erase" onclick="eraseLastChar()" title="마지막 글자 삭제 (Backspace)">
                ⌫ 지우기
            </button>
            <button class="btn danger" id="btn-clear-all" onclick="clearAllText()" title="전체 삭제">
                ✕ 전체삭제
            </button>
        </div>
    </div>

    <!-- Main text display -->
    <div class="main">
        <div class="text-display-area">
            <div class="text-container">
                <div class="text-output empty" id="text-output">
                    Waiting for input…
                </div>
                <div class="char-count" id="char-count">0 chars</div>
            </div>
        </div>
        <div class="char-flash" id="char-flash"></div>
    </div>

    <!-- Confidence Log Panel -->
    <div class="bottom-panel" id="bottom-panel">
        <div class="panel-header" onclick="toggleLogPanel()">
            <div class="panel-title">
                📊 Recognition Log
                <span class="count-badge" id="log-count">0</span>
            </div>
            <button class="panel-toggle" id="panel-toggle">▼</button>
        </div>
        <div class="log-container" id="log-container">
            <div class="empty-log" id="empty-log">인식된 글자가 여기에 표시됩니다</div>
        </div>
    </div>

    <script>
        // ── State ──
        let sentence = "";
        let logEntries = [];
        let ws = null;
        let wsConnected = false;
        let _wsReconnectDelay = 1000;
        let logCollapsed = false;

        // ── WebSocket Connection ──
        function connectWebSocket() {
            const url = `ws://${location.hostname || "localhost"}:12347`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                wsConnected = true;
                updateStatus(true);
                _wsReconnectDelay = 1000;
            };

            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    handleMessage(data);
                } catch (err) {}
            };

            ws.onclose = () => {
                wsConnected = false;
                updateStatus(false);
                _wsReconnectDelay = Math.min(_wsReconnectDelay * 1.5, 30000);
                setTimeout(connectWebSocket, _wsReconnectDelay);
            };

            ws.onerror = () => {};
        }

        function updateStatus(connected) {
            const dot = document.getElementById("ws-status-dot");
            const text = document.getElementById("ws-status-text");
            dot.classList.toggle("connected", connected);
            text.textContent = connected ? "Connected" : "Disconnected";
        }

        function sendToServer(msg) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(msg));
            }
        }

        // ── Message Handler ──
        function handleMessage(data) {
            // Frame data with recognition
            if (data.recognition && data.recognition.class && data.recognition.above_threshold) {
                addRecognizedChar(data.recognition.class, data.recognition.confidence);
            }

            // Streaming text from server (sentence mode)
            if (data.type === "streaming_text") {
                sentence = data.sentence || "";
                renderText();
                if (data.latest_char) {
                    addLogEntry(data.latest_char, data.confidence || 0);
                    flashChar(data.latest_char);
                }
            }
        }

        // ── Recognition ──
        function addRecognizedChar(char, confidence) {
            sentence += char;
            renderText();
            addLogEntry(char, confidence);
            flashChar(char);
        }

        function renderText() {
            const el = document.getElementById("text-output");
            const countEl = document.getElementById("char-count");

            if (sentence.length === 0) {
                el.innerHTML = 'Waiting for input…';
                el.classList.add("empty");
            } else {
                el.innerHTML = escapeHtml(sentence) + '<span class="text-cursor"></span>';
                el.classList.remove("empty");
                // Auto-scroll to bottom
                el.scrollTop = el.scrollHeight;
            }

            countEl.textContent = `${sentence.length} chars`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function flashChar(char) {
            const flash = document.getElementById("char-flash");
            flash.textContent = char;
            flash.classList.remove("active");
            // Force reflow
            void flash.offsetWidth;
            flash.classList.add("active");
        }

        // ── Log Panel ──
        function addLogEntry(char, confidence) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ko-KR', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            });

            const pct = Math.round(confidence * 100);
            const entry = { char, confidence: pct, time: timeStr };
            logEntries.unshift(entry); // newest first

            // Keep max 100 entries
            if (logEntries.length > 100) logEntries.pop();

            renderLog();
        }

        function renderLog() {
            const container = document.getElementById("log-container");
            const emptyEl = document.getElementById("empty-log");
            const countBadge = document.getElementById("log-count");

            countBadge.textContent = logEntries.length;

            if (logEntries.length === 0) {
                if (emptyEl) emptyEl.style.display = "block";
                return;
            }
            if (emptyEl) emptyEl.style.display = "none";

            // Only re-render if we have new entries
            const existingEntries = container.querySelectorAll(".log-entry");

            // Remove 'new' class from old entries
            existingEntries.forEach(el => el.classList.remove("new"));

            // Build newest entry HTML
            const entry = logEntries[0];
            const confClass = entry.confidence >= 85 ? 'conf-high' : 
                              entry.confidence >= 60 ? 'conf-mid' : 'conf-low';
            const barColor = entry.confidence >= 85 ? 'linear-gradient(90deg, #10b981, #34d399)' :
                             entry.confidence >= 60 ? 'linear-gradient(90deg, #f59e0b, #fbbf24)' :
                             'linear-gradient(90deg, #ef4444, #f87171)';

            const div = document.createElement("div");
            div.className = "log-entry new";
            div.innerHTML = `
                <span class="log-time">${entry.time}</span>
                <span class="log-char">${escapeHtml(entry.char)}</span>
                <div class="log-confidence">
                    <div class="conf-bar-track">
                        <div class="conf-bar-fill" style="width: ${entry.confidence}%; background: ${barColor};"></div>
                    </div>
                    <span class="conf-value ${confClass}">${entry.confidence}%</span>
                </div>
            `;

            // Insert at top (after empty-log element)
            if (emptyEl && emptyEl.nextSibling) {
                container.insertBefore(div, emptyEl.nextSibling);
            } else {
                container.prepend(div);
            }

            // Trim excess DOM nodes (keep max 100)
            const allEntries = container.querySelectorAll(".log-entry");
            if (allEntries.length > 100) {
                for (let i = 100; i < allEntries.length; i++) {
                    allEntries[i].remove();
                }
            }
        }

        function toggleLogPanel() {
            logCollapsed = !logCollapsed;
            const container = document.getElementById("log-container");
            const toggle = document.getElementById("panel-toggle");
            container.classList.toggle("collapsed", logCollapsed);
            toggle.classList.toggle("collapsed", logCollapsed);
        }

        // ── Actions ──
        function eraseLastChar() {
            if (sentence.length > 0) {
                sentence = sentence.slice(0, -1);
                renderText();
                sendToServer({ action: "erase_last_char" });
            }
        }

        function clearAllText() {
            sentence = "";
            logEntries = [];
            renderText();
            sendToServer({ action: "clear_all_text" });

            // Clear log DOM
            const container = document.getElementById("log-container");
            container.querySelectorAll(".log-entry").forEach(el => el.remove());
            const emptyEl = document.getElementById("empty-log");
            if (emptyEl) emptyEl.style.display = "block";
            document.getElementById("log-count").textContent = "0";
        }

        // ── Keyboard Shortcuts ──
        document.addEventListener("keydown", (e) => {
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

            switch (e.key) {
                case "Backspace":
                    e.preventDefault();
                    eraseLastChar();
                    break;
                case "Delete":
                    e.preventDefault();
                    clearAllText();
                    break;
                case "l":
                case "L":
                    toggleLogPanel();
                    break;
            }
        });

        // ── Init ──
        renderText();
        setTimeout(connectWebSocket, 500);
    </script>
</body>
</html>
