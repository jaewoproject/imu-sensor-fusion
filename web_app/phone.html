<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirWriting - Phone Action Client</title>
    <!-- QR Code Generation Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* QR Card */
        .qr-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 32px 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .qr-card h2 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 4px;
        }

        .qr-card p {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }

        #qrcode {
            display: inline-block;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .ws-url {
            font-family: monospace;
            font-size: 14px;
            color: #00d2ff;
            background: rgba(0, 210, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
        }

        /* Status */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 15px;
        }

        .status-bar.connected {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-bar.disconnected {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.on {
            background: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
        }

        .dot.off {
            background: #f44336;
            box-shadow: 0 0 8px #f44336;
        }

        /* Log */
        .log-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: left;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #ccc;
        }

        .log-entry.action {
            color: #00d2ff;
            font-weight: bold;
        }

        .log-time {
            color: #666;
            font-size: 11px;
        }

        button {
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(90deg, #3a7bd5, #7b2ff7);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>✍️ AirWriting</h1>
        <p class="subtitle">Phone Action Client</p>

        <!-- QR Code Section -->
        <div class="qr-card">
            <h2>📱 Scan to Connect</h2>
            <p>앱에서 이 QR 코드를 스캔하면 자동으로 연결됩니다</p>
            <div id="qrcode"></div><br>
            <span class="ws-url" id="wsUrlDisplay">ws://loading...:18800</span>
        </div>

        <!-- Status -->
        <div id="statusBar" class="status-bar disconnected">
            <span class="dot off" id="statusDot"></span>
            <span id="statusLabel">Disconnected</span>
        </div>

        <div class="log-container" id="logContainer"></div>

        <button onclick="connect()">🔄 Reconnect</button>
    </div>

    <script>
        const WS_PORT = 18800;
        // Determine local IP from the page URL
        const host = window.location.hostname || '127.0.0.1';
        const wsUrl = `ws://${host}:${WS_PORT}`;
        let ws = null;

        // Generate QR Code
        document.getElementById('wsUrlDisplay').textContent = wsUrl;
        new QRCode(document.getElementById('qrcode'), {
            text: wsUrl,
            width: 180,
            height: 180,
            colorDark: "#1a1a3e",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function addLog(text, isAction = false) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isAction ? ' action' : '');
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${text}`;
            container.prepend(entry);
            if (container.children.length > 30) container.removeChild(container.lastChild);
        }

        function setStatus(connected) {
            const bar = document.getElementById('statusBar');
            const dot = document.getElementById('statusDot');
            const label = document.getElementById('statusLabel');
            if (connected) {
                bar.className = 'status-bar connected';
                dot.className = 'dot on';
                label.textContent = 'Connected to PC 🟢';
            } else {
                bar.className = 'status-bar disconnected';
                dot.className = 'dot off';
                label.textContent = 'Disconnected 🔴';
            }
        }

        function connect() {
            if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); }
            addLog(`Connecting to ${wsUrl}...`);
            try {
                ws = new WebSocket(wsUrl);
                ws.onopen = () => { setStatus(true); addLog('WebSocket Connected'); };
                ws.onclose = () => { setStatus(false); addLog('WebSocket Closed'); setTimeout(connect, 3000); };
                ws.onerror = () => { addLog('WebSocket Error'); };
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'config') {
                            addLog('Configuration received. Ready!');
                        } else if (data.type === 'action') {
                            addLog(`🚀 <b>${data.label}</b> → ${data.keyword}`, true);
                            ws.send(JSON.stringify({ type: 'ack', keyword: data.keyword }));
                        } else if (data.type === 'recognition') {
                            addLog(`Recognized: ${data.label} (No action mapped)`);
                        }
                    } catch (e) { addLog(`Parse Error: ${e.message}`); }
                };
            } catch (e) { addLog(`Connection Error: ${e.message}`); }
        }

        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 15000);

        window.addEventListener('DOMContentLoaded', () => { if (!ws) connect(); });
    </script>
</body>

</html>
