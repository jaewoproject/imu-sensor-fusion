name: Verify

"on":
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Run Python syntax checks
        run: |
          python -m py_compile main.py
          python -m py_compile platform_app/app.py
          python -m py_compile tools/action_dispatcher.py
          python -m py_compile tools/ml_engine.py
          python -m py_compile airwriting_imu/core/controller.py

  web-syntax:
    name: Web Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Studio script syntax
        run: node --check platform_app/app.js

  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        working-directory: android_app
        run: chmod +x gradlew

      - name: Assemble debug APK
        working-directory: android_app
        run: ./gradlew assembleDebug
